<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-API Background Remover</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { max-width: 500px; margin: auto; }
        img { max-width: 100%; margin-top: 20px; border: 1px dashed #ccc; }
        button { padding: 10px 15px; margin-top: 10px; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.3/dist/browser/imgly_background_removal.js"></script>
</head>
<body>

    <div class="container">
        <h2>Local Background Remover</h2>
        <p>This runs entirely in your browser. No API needed!</p>
        
        <input type="file" id="imageInput" accept="image/png, image/jpeg">
        <br>
        <button onclick="removeBg()">Remove Background</button>
        
        <p id="status"></p>
        
        <img id="resultImage" style="display: none;" alt="Result will appear here">
    </div>

    <script>
        async function removeBg() {
            const imageInput = document.getElementById('imageInput');
            const statusText = document.getElementById('status');
            const resultImage = document.getElementById('resultImage');

            if (imageInput.files.length === 0) {
                alert("Please upload an image first!");
                return;
            }

            const imageFile = imageInput.files[0];
            
            // Convert the uploaded file to a URL the AI can read
            const imageUrl = URL.createObjectURL(imageFile);

            statusText.innerText = "Downloading AI model and processing... (This takes a few seconds on the first run)";
            resultImage.style.display = "none";

            try {
                // Run the background removal locally
                const imageBlob = await imglyRemoveBackground(imageUrl);
                
                // Display the result
                const resultUrl = URL.createObjectURL(imageBlob);
                resultImage.src = resultUrl;
                resultImage.style.display = "block";
                statusText.innerText = "Background removed successfully!";

            } catch (error) {
                console.error(error);
                statusText.innerText = "Something went wrong. Check the console.";
            }
        }
    </script>

</body>
</html>
